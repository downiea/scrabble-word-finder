# Vision API keys — set as environment variables, never commit actual values
anthropic.api.key=${ANTHROPIC_API_KEY}
openai.api.key=${OPENAI_API_KEY:}

# Vision provider: "claude" (default) or "openai"
# Can also be overridden per game config via the visionProvider field in game-configs.json
vision.provider=claude

# Allow large image uploads (up to 10MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# CORS — allow the React dev server
spring.web.cors.allowed-origins=http://localhost:3000

server.port=8080
